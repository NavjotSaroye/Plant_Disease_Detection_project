<!DOCTYPE html>

<html>
<head>

```
<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
```

</head>

<body>

<div class="auth-container">

```
<div class="auth-box">

    <h1>

        🌿 Login Account

    </h1>

    <form method="POST">

        <input
        type="text"
        name="username"
        placeholder="Enter Username"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <p>

        Don't have an account?

        <a href="/signup">

            Create Account

        </a>

    </p>

</div>
```

</div>

</body>
</html>
