<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <h1>Create Account</h1>

        <form method="POST">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Signup
            </button>

        </form>

        <p>

            Already have an account?

            <a href="/login">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
